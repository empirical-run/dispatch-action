name: "Run Empirical tests"
description: "This action dispatches a request to run tests"
author: "empirical.run"

# Add your action's branding here. This will appear on the GitHub Marketplace.
branding:
  icon: "send"
  color: "gray-dark"

# Define your inputs here.
inputs:
  auth-key:
    description: "Auth key for the application"
    required: false
  build-url:
    description: "Deprecated: the build URL is now sent to tests as the BUILD_URL environment variable. Use the environment-variables input to set BUILD_URL instead."
    required: false
    deprecationMessage: "build-url is deprecated. Set BUILD_URL via the environment-variables input instead."
  environment:
    description: "Environment to run the tests on"
    required: true
  environment-variables:
    description: "Environment variables for the test run, one per line (e.g. 'NAME: value'). These override the environment's configured variables."
    required: false
  metadata:
    description: "Key-value pairs, one per line (e.g. 'key: value'). Values can be strings or numbers."
    required: false

runs:
  using: node24
  main: dist/index.js
